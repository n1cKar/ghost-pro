<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.B.1 | Ghost Detector</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="scanline"></div>
    <div class="ui-container">
        <header>
            <div class="status-led" id="led"></div>
            <h1>EVP ANALYZER <span class="version">v3.0</span></h1>
        </header>

        <main>
            <div class="visualizer-box">
                <canvas id="canvas"></canvas>
                <div class="grid-overlay"></div>
            </div>

            <div class="readout">
                <div class="data-point">FREQ: <span id="freq">0Hz</span></div>
                <div class="data-point">SENS: <span id="sens">AUTO</span></div>
                <div class="data-point">STATUS: <span id="status">OFFLINE</span></div>
            </div>
        </main>

        <nav class="controls">
            <button id="startBtn">Initialize Sensors</button>
            <button id="scanBtn" disabled>Deep Frequency Scan</button>
        </nav>

        <div id="log">SYSTEM READY... STANDBY FOR CALIBRATION.</div>
    </div>
    <script src="script.js"></script>
</body>

</html>
